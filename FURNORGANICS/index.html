<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Furn Organics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      margin: 0;
      padding: 40px 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 700px;
      background: #f0f0f0;
      padding: 20px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .header img {
      width: 200px;
      height: auto;
      object-fit: contain;
    }

    textarea {
      width: 100%;
      resize: none;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 6px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    .product {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
    }

    .cart-item {
      margin-bottom: 5px;
    }

    #status {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- IMAGE + COMPANY DESCRIPTION -->
  <div class="header">
    <img src="company-image.jpg" alt="Company Image">

    <textarea rows="6" readonly>
Furn Organics sells high quality cannabis. We grow and dry all of our products naturally and responsibly. Est. 2025

Disclaimer: Furn Organics sells marijuana that may be illegal in some states or countries. Please exercise cauion while using.
    </textarea>
  </div>

  <hr>

  <!-- PRODUCTS -->
  <h2>Cannabis Flower</h2>
  <div id="products">Loading products...</div>

  <hr>

  <!-- CART -->
  <h2>Cart</h2>
  <div id="cart">Cart is empty</div>
  <p><b>Total:</b> $<span id="total">0.00</span></p>

  <hr>

  <!-- CHECKOUT -->
  <h2>Checkout</h2>
  <input id="name" placeholder="Your name">
  <input id="email" placeholder="Your email">
  <input id="note" placeholder="Note (optional)">
  <button id="purchase">Purchase</button>

  <p id="status"></p>
  <p>Powered by Furn</p>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
/* =======================
   EMAILJS CONFIG
======================= */

const PUBLIC_KEY = "dMY8Wq6ssR3M5I1go";
const SERVICE_ID = "service_zaglobv";
const TEMPLATE_ID = "template_93vjopg";

emailjs.init(PUBLIC_KEY);

/* =======================
   PRODUCT + CART DATA
======================= */

let PRODUCTS = [];
const cart = [];

const productsDiv = document.getElementById("products");

/* =======================
   LOAD PRODUCTS FROM GITHUB / JSON
======================= */

async function loadProducts() {
  try {
    const response = await fetch("products.json");

    if (!response.ok) {
      throw new Error("Could not load products.json");
    }

    PRODUCTS = await response.json();
    renderProducts();

  } catch (err) {
    console.error(err);
    productsDiv.textContent = "Failed to load products.";
  }
}

/* =======================
   RENDER PRODUCTS
======================= */

function renderProducts() {
  productsDiv.innerHTML = "";

  const availableProducts = PRODUCTS.filter(p => p.inStock !== false);

  if (availableProducts.length === 0) {
    productsDiv.textContent = "No products available.";
    return;
  }

  availableProducts.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <p>
        <b>${p.name}</b> — $${Number(p.price).toFixed(2)}
      </p>
      <button onclick="addToCart('${p.id}')">Add</button>
    `;

    productsDiv.appendChild(div);
  });
}

/* =======================
   CART LOGIC
======================= */

function addToCart(id) {
  const product = PRODUCTS.find(p => p.id === id);

  if (!product) {
    return;
  }

  const item = cart.find(i => i.id === id);

  if (item) {
    item.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  renderCart();
}

function removeFromCart(id) {
  const index = cart.findIndex(i => i.id === id);

  if (index !== -1) {
    cart.splice(index, 1);
  }

  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  const totalSpan = document.getElementById("total");

  if (cart.length === 0) {
    cartDiv.textContent = "Cart is empty";
    totalSpan.textContent = "0.00";
    return;
  }

  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(i => {
    const line = Number(i.price) * i.qty;
    total += line;

    cartDiv.innerHTML += `
      <div class="cart-item">
        ${i.qty}× ${i.name} — $${line.toFixed(2)}
        <button onclick="removeFromCart('${i.id}')">Remove</button>
      </div>
    `;
  });

  totalSpan.textContent = total.toFixed(2);
}

/* =======================
   PURCHASE → SEND EMAIL
======================= */

document.getElementById("purchase").onclick = async () => {
  const status = document.getElementById("status");
  status.textContent = "";

  if (cart.length === 0) {
    status.textContent = "Cart is empty.";
    return;
  }

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const note = document.getElementById("note").value.trim();

  if (!name || !email) {
    status.textContent = "Name and email required.";
    return;
  }

  const orderItems = cart
    .map(i => `${i.qty}× ${i.name} ($${(Number(i.price) * i.qty).toFixed(2)})`)
    .join("\n");

  const total = cart
    .reduce((sum, item) => sum + Number(item.price) * item.qty, 0)
    .toFixed(2);

  const orderId = crypto.randomUUID().slice(0, 8).toUpperCase();

  try {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      order_id: orderId,
      customer_name: name,
      customer_email: email,
      order_items: orderItems,
      order_total: total,
      note: note || "(none)"
    });

    status.textContent = "Order sent successfully!";

    cart.length = 0;
    renderCart();

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("note").value = "";

  } catch (err) {
    console.error(err);
    status.textContent = "Failed to send order.";
  }
};

/* =======================
   START SITE
======================= */

loadProducts();
</script>

</body>
</html>
