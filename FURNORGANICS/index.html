<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Furn Organics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      margin: 0;
      padding: 40px 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 700px;
      background: #f0f0f0;
      padding: 20px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .header img {
      width: 200px;
      height: auto;
      object-fit: contain;
    }

    textarea {
      width: 100%;
      resize: none;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 6px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    .product {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
    }

    .cart-item {
      margin-bottom: 5px;
    }

    #status {
      font-weight: bold;
    }

    .order-box {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
    }

    .shipping-message {
      background: #fff7d6;
      border: 1px solid #d6be5c;
      padding: 10px;
      margin-bottom: 10px;
    }

    .disabled-shipping {
      background: #ffe0e0;
      border: 1px solid #cc7777;
      padding: 10px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- IMAGE + COMPANY DESCRIPTION -->
  <div class="header">
    <img src="company-image.jpg" alt="Company Image">

    <textarea rows="6" readonly>
Idk yet
    </textarea>
  </div>

  <hr>

  <!-- PRODUCTS -->
  <h2>Cannabis Flower</h2>
  <div id="products">Loading products...</div>

  <hr>

  <!-- CART -->
  <h2>Cart</h2>
  <div id="cart">Cart is empty</div>
  <p><b>Total:</b> $<span id="total">0.00</span></p>

  <hr>

  <!-- CHECKOUT -->
  <h2>Checkout</h2>

  <div id="orderTypeSection" class="order-box">
    <p><b>Order Type</b></p>

    <label>
      <input type="radio" name="orderType" value="pickup" checked>
      Pickup order
    </label>

    <div id="shippingOption"></div>
  </div>

  <div id="shippingDisabledText" class="disabled-shipping" style="display:none;">
    Shipping orders are not being recieved right now.
  </div>

  <div id="shippingFields" style="display:none;">
    <div id="shippingMessage" class="shipping-message"></div>

    <input id="address" placeholder="Street address">
    <input id="state" placeholder="State">
    <input id="zip" placeholder="Zip code">
  </div>

  <input id="name" placeholder="Your name">
  <input id="email" placeholder="Your email">
  <input id="note" placeholder="Note (optional)">

  <button id="purchase">Purchase</button>

  <p id="status"></p>
  <p>Powered by Furn</p>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
/* =======================
   EMAILJS CONFIG
======================= */

const PUBLIC_KEY = "dMY8Wq6ssR3M5I1go";
const SERVICE_ID = "service_zaglobv";
const TEMPLATE_ID = "template_93vjopg";

emailjs.init(PUBLIC_KEY);

/* =======================
   PRODUCT + CART DATA
======================= */

let PRODUCTS = [];
let SETTINGS = {
  shippingEnabled: false,
  shippingMessage: ""
};

const cart = [];

const productsDiv = document.getElementById("products");
const shippingOption = document.getElementById("shippingOption");
const shippingFields = document.getElementById("shippingFields");
const shippingMessage = document.getElementById("shippingMessage");
const shippingDisabledText = document.getElementById("shippingDisabledText");

/* =======================
   LOAD PRODUCTS FROM JSON
======================= */

async function loadProducts() {
  try {
    const response = await fetch("products.json?t=" + Date.now());

    if (!response.ok) {
      throw new Error("Could not load products.json");
    }

    const data = await response.json();

    SETTINGS = data.settings || SETTINGS;
    PRODUCTS = data.products || [];

    renderProducts();
    renderShippingOptions();

  } catch (err) {
    console.error(err);
    productsDiv.textContent = "Failed to load products.";
  }
}

/* =======================
   RENDER PRODUCTS
======================= */

function renderProducts() {
  productsDiv.innerHTML = "";

  const availableProducts = PRODUCTS.filter(p => p.inStock !== false);

  if (availableProducts.length === 0) {
    productsDiv.textContent = "No products available.";
    return;
  }

  availableProducts.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <p>
        <b>${p.name}</b> — $${Number(p.price).toFixed(2)}
      </p>
      <button onclick="addToCart('${p.id}')">Add</button>
    `;

    productsDiv.appendChild(div);
  });
}

/* =======================
   SHIPPING / PICKUP LOGIC
======================= */

function renderShippingOptions() {
  shippingOption.innerHTML = "";

  if (SETTINGS.shippingEnabled === true) {
    shippingDisabledText.style.display = "none";

    shippingOption.innerHTML = `
      <label>
        <input type="radio" name="orderType" value="shipping">
        Shipping order
      </label>
    `;

    shippingMessage.textContent = SETTINGS.shippingMessage || 
      "Shipping orders are handled after your order is received.";

  } else {
    shippingDisabledText.style.display = "block";
    shippingFields.style.display = "none";
  }

  const orderTypeInputs = document.querySelectorAll("input[name='orderType']");
  orderTypeInputs.forEach(input => {
    input.addEventListener("change", updateCheckoutFields);
  });

  updateCheckoutFields();
}

function getOrderType() {
  const selected = document.querySelector("input[name='orderType']:checked");
  return selected ? selected.value : "pickup";
}

function updateCheckoutFields() {
  const orderType = getOrderType();

  if (orderType === "shipping" && SETTINGS.shippingEnabled === true) {
    shippingFields.style.display = "block";
  } else {
    shippingFields.style.display = "none";
  }
}

/* =======================
   CART LOGIC
======================= */

function addToCart(id) {
  const product = PRODUCTS.find(p => p.id === id);

  if (!product) {
    return;
  }

  const item = cart.find(i => i.id === id);

  if (item) {
    item.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  renderCart();
}

function removeFromCart(id) {
  const index = cart.findIndex(i => i.id === id);

  if (index !== -1) {
    cart.splice(index, 1);
  }

  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  const totalSpan = document.getElementById("total");

  if (cart.length === 0) {
    cartDiv.textContent = "Cart is empty";
    totalSpan.textContent = "0.00";
    return;
  }

  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(i => {
    const line = Number(i.price) * i.qty;
    total += line;

    cartDiv.innerHTML += `
      <div class="cart-item">
        ${i.qty}× ${i.name} — $${line.toFixed(2)}
        <button onclick="removeFromCart('${i.id}')">Remove</button>
      </div>
    `;
  });

  totalSpan.textContent = total.toFixed(2);
}

/* =======================
   PURCHASE → SEND EMAIL
======================= */

document.getElementById("purchase").onclick = async () => {
  const status = document.getElementById("status");
  status.textContent = "";

  if (cart.length === 0) {
    status.textContent = "Cart is empty.";
    return;
  }

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const note = document.getElementById("note").value.trim();

  const orderType = getOrderType();

  const address = document.getElementById("address").value.trim();
  const state = document.getElementById("state").value.trim();
  const zip = document.getElementById("zip").value.trim();

  if (!name || !email) {
    status.textContent = "Name and email required.";
    return;
  }

  if (orderType === "shipping") {
    if (SETTINGS.shippingEnabled !== true) {
      status.textContent = "Shipping orders are not being recieved right now.";
      return;
    }

    if (!address || !state || !zip) {
      status.textContent = "Address, state, and zip code are required for shipping.";
      return;
    }
  }

  const orderItems = cart
    .map(i => `${i.qty}× ${i.name} ($${(Number(i.price) * i.qty).toFixed(2)})`)
    .join("\n");

  const total = cart
    .reduce((sum, item) => sum + Number(item.price) * item.qty, 0)
    .toFixed(2);

  const orderId = crypto.randomUUID().slice(0, 8).toUpperCase();

  const shippingAddress = orderType === "shipping"
    ? `${address}, ${state} ${zip}`
    : "N/A - Pickup order";

  try {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      order_id: orderId,
      customer_name: name,
      customer_email: email,
      order_items: orderItems,
      order_total: total,
      note: note || "(none)",

      order_type: orderType,
      shipping_address: shippingAddress,
      shipping_state: orderType === "shipping" ? state : "N/A",
      shipping_zip: orderType === "shipping" ? zip : "N/A",
      shipping_message: orderType === "shipping" ? SETTINGS.shippingMessage : "N/A"
    });

    status.textContent = "Order sent successfully!";

    cart.length = 0;
    renderCart();

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("note").value = "";
    document.getElementById("address").value = "";
    document.getElementById("state").value = "";
    document.getElementById("zip").value = "";

    document.querySelector("input[name='orderType'][value='pickup']").checked = true;
    updateCheckoutFields();

  } catch (err) {
    console.error(err);
    status.textContent = "Failed to send order.";
  }
};

/* =======================
   START SITE
======================= */

loadProducts();
</script>

</body>
</html>
